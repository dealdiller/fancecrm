services:
  web:
    build: .
    ports:
      - "4173:4173"
    environment:
      PORT: 4173

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fenceflow
      POSTGRES_USER: fenceflow
      POSTGRES_PASSWORD: fenceflow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
