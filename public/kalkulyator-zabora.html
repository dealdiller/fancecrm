<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Калькулятор стоимости забора онлайн - FenceFlow</title>
    <meta name="description" content="Онлайн-калькулятор забора: тип, длина, высота, ворота, калитки, фундамент, монтаж и доставка." />
    <link rel="canonical" href="https://fenceflow-crm.vercel.app/kalkulyator-zabora" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="workspace">
      <section class="page-heading">
        <div>
          <p class="eyebrow">SEO калькулятор</p>
          <h1>Калькулятор стоимости забора</h1>
          <p class="lead">Публичный расчет сохраняет параметры забора, UTM-метки и URL страницы в новой сделке CRM.</p>
          <a class="secondary-button as-link" href="/">Вернуться в FenceFlow CRM</a>
        </div>
      </section>
      <section class="panel calculator">
        <label>Тип забора<select><option>Профнастил</option><option>Евроштакетник</option><option>3D-сетка</option></select></label>
        <label>Длина, м<input type="number" value="72" /></label>
        <label>Высота, м<input type="number" value="2" /></label>
        <label>Ворота<input type="number" value="1" /></label>
        <button class="primary-button" type="button">Отправить расчет в CRM</button>
      </section>
    </main>
  </body>
</html>
